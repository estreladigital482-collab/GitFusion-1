name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prepare static Android client
        run: |
          mkdir -p android-web
          cp -r public/* android-web/
          cat > android-web/config.js <<'CONFIG'
          window.GITFUSION_API_BASE = "http://127.0.0.1:3737";
          CONFIG

      - name: Install Capacitor
        run: npm install -D @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Capacitor project
        run: |
          cat > capacitor.config.json <<'JSON'
          {
            "appId": "ai.gitfusion.app",
            "appName": "GitFusion",
            "webDir": "android-web",
            "server": { "cleartext": true }
          }
          JSON
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitfusion-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
